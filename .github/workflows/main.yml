name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Se ejecuta cada vez que subís cambios a main

# Permisos necesarios para que Actions pueda escribir en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Versión estable de Node
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Instalación limpia basada en tu package-lock.json

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Carpeta donde Vite genera el build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
